<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <div class="maindiv">

        <div class="formdiv">
            <h1>Registration Form</h1>
            <div class="inputform"></div>
        </div>


        <div class="output">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>DOB</th>
                        <th>Gender</th>
                        <th>Skills</th>
                        <th>Department</th>
                    </tr>
                </thead>

                <tbody>   </tbody>
            </table>
        </div>
    </div>



    <script>

        document.body.style.margin = "0";
        document.body.style.padding = "20px";
        document.body.style.fontFamily = "Arial";
        document.body.style.backgroundColor = "#f0f2f5";

        let maindiv= document.querySelector(".maindiv")
        maindiv.style.display = "flex"
        maindiv.style.gap = "20px"
        maindiv.style.alignItems = "flex-start"


        let formdiv= document.querySelector(".formdiv")
        formdiv.style.width = "40%"
        formdiv.style.backgroundColor = "black"
        formdiv.style.padding = "20px"
        formdiv.style.borderRadius = "10px"
        formdiv.style.boxShadow = "0px 0px 10px gray"
        formdiv.style.color = "white"

        let h1= document.querySelector("h1")
        h1.style.textAlign = "center"
        

        let output= document.querySelector(".output")
        output.style.width = "60%"
        output.style.backgroundColor = "white"
        output.style.padding = "20px"
        output.style.borderRadius = "10px"
        output.style.boxShadow = "0px 0px 10px gray"


        let table= document.querySelector("table")
        table.style.width = "100%"
        table.style.borderCollapse = "collapse"


        let th= document.querySelectorAll("th")
        th.forEach(function(th){
            th.style.border = "1px solid black"
            th.style.padding = "10px"
            th.style.backgroundColor = "#f2f2f2"
        })



        formdiv.innerHTML += `
        <label>Name:
        <input type="text" id="name" placeholder="Enter your name"><br><br>
        </label>
        <label>Email:
        <input type="email" id="email" placeholder="Enter your email"><br><br>
        </label>
        <label>DOB:
        <input type="date" id="dob"><br><br>
        </label>
        <label>Gender:</label>
        <label><input type="radio" name="gender" value="male"> Male</label>
        <label><input type="radio" name="gender" value="female">    Female</label><br><br>
        <label>Skills:
        <label><input type="checkbox" name="skills" value="html"> HTML</label>
        <label><input type="checkbox" name="skills" value="css"> CSS</label>
        <label><input type="checkbox" name="skills" value="javascript"> JavaScript</label><br><br>
        </label>
        <label>Department:
        <select id="department">
            <option value="">Select Department</option>
            <option value="hr">HR</option>
            <option value="it">IT</option>
            <option value="finance">Finance</option>
            <option value="marketing">Marketing</option>
            <option value="sales">Sales</option>
        </select><br><br>
        </label>
        <button id="formbtn">Submit</button>

        `

        let tbody= document.querySelector("tbody")
        
        
        
        let namee= document.getElementById("name")
        let email= document.getElementById("email")
        let dob= document.getElementById("dob")
        let gender= document.getElementsByName("gender")
        let skills= document.getElementsByName("skills")
        let department= document.getElementById("department")
        
        
        let formbtn= document.getElementById("formbtn")
        
        formbtn.addEventListener("click", function(e){
            e.preventDefault()
            let genderValue = "";
            for(let i=0; i<gender.length; i++){
                if(gender[i].checked){
                    genderValue = gender[i].value;
                }
            }
            
            let skillsValue = [];
            for(let i=0; i<skills.length; i++){
                if(skills[i].checked){
                    skillsValue.push(skills[i].value);
                }
            }
            
            let tr= document.createElement("tr")

            let values= [
            namee.value,
            email.value,
            dob.value,
            genderValue,
            skillsValue.join(", "),
            department.value
            ]
            
            
            values.forEach(function(value){
                let td =document.createElement("td")
                td.innerText = value
                tr.appendChild(td)

                td.style.border = "1px solid black"
                td.style.padding = "10px"
            })

            tbody.appendChild(tr)

            namee.value = ""
            email.value = ""    
            dob.value = ""
            department.value = ""

            for(let i = 0; i < gender.length; i++){
                gender[i].checked = false
            }

            for(let i = 0; i < skills.length; i++){
                skills[i].checked = false
            }
        })



    </script>



</body>
</html>
