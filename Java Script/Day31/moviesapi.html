<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #contener{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card{
            width: 400px;
            border: 1px solid black;
            padding: 20px;
            background-color: rgb(71, 108, 109);
            border-radius: 60px;
        }
        .poster img{
            width: 50%;
            height: 250px;
            padding-left: 100px;
        }
        </style>
</head>
<body>
    <div id="contener"></div>
    

    <script>

        //          movies app
    async function getMovies() {
        let url = "https://www.omdbapi.com/?t=titanic&apikey=76d079f0";

        let response = await fetch(url);
        let data = await response.json();

        console.log(data);   
        let contener = document.getElementById("contener");
        let card = document.createElement("div");
        card.className = "card";
        card.innerHTML=`
        <h1 style="text-align: center;">${data.Title}</h1>
        <div class="poster"><img src="${data.Poster}" alt="movie poster"></div>
        <p><b>Released:</b> ${data.Released}</p>
        <p><b>Genre:</b> ${data.Genre}</p>
        <p><b>Director:</b> ${data.Director}</p>
        <p><b>Actors:</b> ${data.Actors}</p>
        <p><b>Plot:</b> ${data.Plot}</p>
        <p><b>Awards:</b> ${data.Awards}</p>
        <h3>Box Office: ${data.BoxOffice}</h3>
        `
        contener.append(card)
}

getMovies();
        
    </script>
</body>
</html>
